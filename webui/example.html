<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MICHELIN Guide — Aperçu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --crimson: #bd2327;
      --ink: #1c1c1e;
      --paper: #ffffff;
      --hair: rgba(255, 255, 255, .82);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%; width: 100%; overflow-x: hidden;
      background: #0c0c0d; color: var(--ink);
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .stage { position: relative; max-width: 460px; margin: 0 auto; min-height: 100dvh; }

    .cam { position: relative; height: 62dvh; min-height: 380px; overflow: hidden;
      background: radial-gradient(120% 90% at 50% 18%, #2c2d31 0%, #121214 72%); }
    .topbar { position: absolute; top: 0; left: 0; right: 0; display: flex;
      align-items: center; justify-content: space-between; padding: 16px 20px; }
    .guide-mark { color: #fff; font-weight: 700; letter-spacing: .18em; font-size: 13px;
      text-shadow: 0 1px 3px rgba(0,0,0,.5); }
    .guide-mark em { font-family: "Playfair Display", Georgia, serif; font-style: italic;
      font-weight: 500; letter-spacing: 0; }
    .flip { width: 38px; height: 38px; border: 1px solid rgba(255,255,255,.55);
      border-radius: 50%; background: rgba(0,0,0,.18); color: #fff; font-size: 17px; }

    .viewfinder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -54%);
      width: min(70%, 300px); aspect-ratio: 3/4; }
    .bracket { position: absolute; width: 26px; height: 26px; border: 0 solid var(--hair); }
    .tl { top: 0; left: 0; border-top-width: 2px; border-left-width: 2px; }
    .tr { top: 0; right: 0; border-top-width: 2px; border-right-width: 2px; }
    .bl { bottom: 0; left: 0; border-bottom-width: 2px; border-left-width: 2px; }
    .br { bottom: 0; right: 0; border-bottom-width: 2px; border-right-width: 2px; }
    .scan-line { position: absolute; left: 8px; right: 8px; top: 0; height: 1px;
      background: var(--hair); opacity: .65; animation: sweep 3.1s cubic-bezier(.45,0,.55,1) infinite; }
    @keyframes sweep { 0%{top:4%;opacity:0} 12%{opacity:.7} 88%{opacity:.7} 100%{top:96%;opacity:0} }
    .hint { position: absolute; bottom: 40px; left: 0; right: 0; margin: 0; text-align: center;
      color: rgba(255,255,255,.9); font-size: 13px; text-shadow: 0 1px 3px rgba(0,0,0,.55); }

    .sheet { background: var(--paper); border-radius: 22px 22px 0 0; margin-top: -22px;
      position: relative; padding: 14px 24px 30px; box-shadow: 0 -14px 40px rgba(0,0,0,.22); }
    .grip { display: block; width: 42px; height: 4px; margin: 4px auto 18px; border-radius: 4px; background: #d9d6d0; }
    .sheet-head { display: flex; align-items: baseline; justify-content: space-between; }
    .verdict { margin: 0; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: #8a8a8e; }
    .star-row { color: var(--crimson); font-size: 18px; letter-spacing: 2px; }
    .place-name { font-family: "Playfair Display", Georgia, serif; font-weight: 700;
      font-size: 34px; line-height: 1.05; margin: 6px 0 4px; }
    .place-meta { margin: 0; color: #5c5c60; font-size: 14px; }
    .place-meta sup { font-size: .7em; }
    .distinction { font-family: "Playfair Display", Georgia, serif; font-style: italic;
      font-size: 16px; color: var(--crimson); margin: 14px 0 18px; }
    .facts { margin: 0 0 22px; border-top: 1px solid #eceae5; }
    .facts > div { display: flex; justify-content: space-between; gap: 16px; padding: 11px 0; border-bottom: 1px solid #eceae5; }
    .facts dt { margin: 0; color: #8a8a8e; font-size: 13px; }
    .facts dd { margin: 0; font-size: 14px; font-weight: 500; text-align: right; }
    .sheet-actions { display: grid; gap: 10px; }
    .book-btn { border: 0; background: var(--crimson); color: #fff; font-size: 15px; font-weight: 600;
      padding: 15px; border-radius: 12px; cursor: pointer; }
    .ghost-btn { border: 1px solid #d9d6d0; background: #fff; color: var(--ink); font-size: 15px;
      padding: 14px; border-radius: 12px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="cam">
      <div class="topbar">
        <span class="guide-mark">MICHELIN <em>Guide</em></span>
        <button class="flip" type="button" aria-label="Changer de caméra">⟲</button>
      </div>
      <div class="viewfinder">
        <span class="bracket tl"></span><span class="bracket tr"></span>
        <span class="bracket bl"></span><span class="bracket br"></span>
        <div class="scan-line"></div>
      </div>
      <p class="hint">Cadrez la devanture ou le menu de l'établissement</p>
    </div>

    <section class="sheet">
      <span class="grip"></span>
      <div class="sheet-head">
        <p class="verdict">Établissement reconnu</p>
        <div class="star-row" aria-label="Deux étoiles"><span class="star">★</span><span class="star">★</span></div>
      </div>
      <h1 class="place-name">Le Gabriel</h1>
      <p class="place-meta">Cuisine française créative · Paris 8<sup>e</sup></p>
      <p class="distinction">Une cuisine d'excellence — vaut le détour.</p>
      <dl class="facts">
        <div><dt>Chef</dt><dd>Jérôme Banctel</dd></div>
        <div><dt>Adresse</dt><dd>42 av. Gabriel, La Réserve</dd></div>
        <div><dt>Budget</dt><dd>190 – 320 €</dd></div>
      </dl>
      <div class="sheet-actions">
        <button class="book-btn" type="button">Réserver une table</button>
        <button class="ghost-btn" type="button">Voir la fiche complète</button>
      </div>
    </section>
  </div>
</body>
</html>
